# Railway service configuration for the Lyra worker.
# Build context is the repo root so the worker image can include
# core_system_prompt.md, audits/, expectations/, and the_penny_lane_project/.

[build]
  dockerfilePath = "Dockerfile.worker"

[deploy]
  # DB-polling mode works without Redis; add a Railway Redis plugin and set
  # REDIS_URL to enable BullMQ for immediate job pickup instead of polling.
  startCommand = "node dist/index.js"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
