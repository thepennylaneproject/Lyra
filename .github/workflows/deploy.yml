name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push to Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release Notes
        id: release
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          echo "## Lyra $VERSION" >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "### Docker Images" >> /tmp/release.md
          echo "- Dashboard: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:$VERSION\`" >> /tmp/release.md
          echo "- Worker: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:$VERSION\`" >> /tmp/release.md
          echo "" >> /tmp/release.md
          echo "### Upgrade Steps" >> /tmp/release.md
          echo "1. Update your docker-compose.yml or Kubernetes manifests with the new image tags" >> /tmp/release.md
          echo "2. Run migrations: \`make migrate\`" >> /tmp/release.md
          echo "3. Restart services: \`make restart\`" >> /tmp/release.md
          cat /tmp/release.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: /tmp/release.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log deployment
        run: |
          echo "✓ Successfully built and pushed Lyra ${{ steps.version.outputs.VERSION }}"
          echo ""
          echo "Dashboard: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-dashboard:${{ steps.version.outputs.VERSION }}"
          echo "Worker: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ steps.version.outputs.VERSION }}"
