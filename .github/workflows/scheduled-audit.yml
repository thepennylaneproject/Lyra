name: Scheduled Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Optional project name to target'
        required: false
        type: string
      repository_url:
        description: 'Optional repository URL to target'
        required: false
        type: string
      audit_mode:
        description: 'Which orchestration step to start'
        required: false
        default: 'weekly_audit'
        type: choice
        options:
          - weekly_audit
          - onboard_project
          - re_audit_project
          - synthesize_project
  repository_dispatch:
    types:
      - onboard_project
      - re_audit_project
      - synthesize_project
      - audit_project

permissions:
  issues: write

jobs:
  create-audit-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create weekly audit issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const eventName = context.eventName;
            const dispatchType = context.payload.action || context.payload.event_type || 'weekly_audit';
            const projectName = context.payload.inputs?.project_name || context.payload.client_payload?.project_name || '';
            const repositoryUrl = context.payload.inputs?.repository_url || context.payload.client_payload?.repository_url || '';
            const auditMode = context.payload.inputs?.audit_mode || dispatchType;
            const titlePrefix = eventName === 'schedule' ? '[Scheduled Audit]' : '[Lyra Control Plane]';
            const title = projectName
              ? `${titlePrefix} ${auditMode} - ${projectName} - ${today}`
              : `${titlePrefix} ${auditMode} - ${today}`;

            const body = `## Lyra Orchestration — ${today}

@copilot Please run a full compliance audit of The Pennylane Project using the \`audit-agent\` profile at \`.github/agents/audit-agent.md\`.

### Trigger

- Event: \`${eventName}\`
- Mode: \`${auditMode}\`
- Project: \`${projectName || 'all projects'}\`
- Repository: \`${repositoryUrl || 'not set'}\`

### Instructions

1. Read **all** expectations documents in \`/expectations/\` before beginning:
   - \`expectations/advocera-expectations.md\`
   - \`expectations/codra-expectations.md\`
   - \`expectations/founderos-expectations.md\`
   - \`expectations/mythos-expectations.md\`
   - \`expectations/passagr-expectations.md\`
   - \`expectations/relevnt-expectations.md\`
   - \`expectations/embr-expectations.md\`
   - \`expectations/ready-expectations.md\`
   - \`expectations/dashboard-expectations.md\`
   - \`expectations/restoration-project-expectations.md\`
   - \`expectations/sarahsahl-pro-expectations.md\`

2. Read \`.github/copilot-instructions.md\` for global behavioral rules.

3. For each of the 11 apps, audit the corresponding source directory in \`the_penny_lane_project/\` and the relevant source files against the expectations document.

4. For **every violation found**, file a separate GitHub Issue with:
   - Title: \`[AUDIT] <short description>\`
   - Labels: \`audit\` plus one of \`critical\`, \`warning\`, or \`suggestion\`
   - File path and line number where applicable
   - The exact expectation text being violated (quoted verbatim)
   - A recommended fix

5. If this run was triggered for a single project, keep the audit scoped to that project and note the scope in the issue body.

6. If an expectations document is missing for any discovered app, file \`[AUDIT] Missing expectations document for <app-name>\` labeled \`warning\`.

7. When all apps have been audited, post a final summary comment on **this issue** with:
    - Total violations found, broken down by severity
    - Links to all issues filed
    - Per-app compliance status
    - Any apps that could not be fully assessed

### Output Location

Save a machine-readable summary to \`audits/runs/${today}-audit-summary.json\` following the schema in \`audits/schema/audit-output.schema.json\`.

### Constraints

- Do **not** modify any files in \`/expectations/\`
- Do **not** auto-merge or auto-commit any code changes
- Do **not** run deployments or trigger CI pipelines
- Always cite the specific expectation section when filing an issue
`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['audit', eventName === 'schedule' ? 'automated' : 'control-plane'],
              assignees: ['copilot'],
            });
