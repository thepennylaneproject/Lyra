# Deploy from repo root; app lives in dashboard/
#
# Publish path is relative to `base`. With base = "dashboard", use ".next" — not
# "dashboard/.next" (that becomes dashboard/dashboard/.next on the build image).
# If the UI still overrides publish, clear it: Site settings → Build & deploy →
# Publish directory (empty = use netlify.toml).
[build]
  base = "dashboard"
  command = "npm run build"
  publish = ".next"

# Next inlines NEXT_PUBLIC_* into bundles; Supabase URL is public by design.
# LYRA_VLLM_BASE_URL is a service base URL, not an API key; the scanner still
# flags any env value that appears under .netlify/ artifacts.
# Edge middleware inlines DASHBOARD_API_SECRET / ORCHESTRATION_ENQUEUE_SECRET; Deno vendor
# under edge-functions often false-positives. https://ntl.fyi/configure-secrets-scanning
[build.environment]
  # Public URLs/keys Next embeds; anon key is client-safe by Supabase design.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY,NEXT_PUBLIC_SENTRY_DSN,NEXT_PUBLIC_LYRA_WORKFLOWS_DOC_URL,LYRA_VLLM_BASE_URL,DASHBOARD_API_SECRET,ORCHESTRATION_ENQUEUE_SECRET,OPENAI_API_KEY,ANTHROPIC_API_KEY,AIMLAPI_API_KEY,REDIS_URL"
  SECRETS_SCAN_OMIT_PATHS = "**/edge-runtime/vendor/**,.env.example,dashboard/.env.example"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
